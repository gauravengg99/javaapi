<!DOCTYPE html>
  
   <title>Customer Machine Map</title>

    <meta charset="utf-8">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="touchIcon" href="/src/main/resources/static/image/logo.jpg"/>
    <link rel="shortcut icon" href="/src/main/resources/static/image/logo.jpg"/>
    <style>


        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
        }

        #map {
            width: 100%;
            height: 100vh;
        }
        .popup {
            min-width: 180px;
        }

        .title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

    </style>

</head>
<body>
<img src="/image/logo.jpg" alt="Logo" style="position: absolute; top: 10px; right: 20px; width: 100px; height: 50px; z-index: 1000;">
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="customerData.js"></script>
<script>

    const map = L.map('map').setView([22.9734, 78.6569], 5);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18
    }).addTo(map);

    fetch('/api/customers/')
        .then(response => response.json())
        .then(customers => {
            
            customers.forEach(customer => {

                const marker = L.marker([
                    customer.latitude,
                    customer.longitude
                ]).addTo(map);

                marker.bindPopup(`
                    <div class="popup">
                        <div class="title">
                            ${customer.customerName}
                        </div>

                        <div>
                            Machine: ${customer.machineModel}
                        </div>

                        <div>
                            City: ${customer.city}
                        </div>
                    </div>
                `);

                marker.on('mouseover', function () {
                    marker.openPopup();
                });

                marker.on('mouseout', function () {
                    marker.closePopup();
                });

            });
        });

</script>

</body>
</html>
